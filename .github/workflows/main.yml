name: Build and Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore SharpTimer.csproj

    - name: Build
      run: dotnet publish SharpTimer.csproj --configuration Release --runtime linux-x64 --self-contained false --output build

    - name: Copy additional files
      run: |
        cp -r lang build/lang

    - name: Clean up old artifacts
      run: rm -f SharpTimer.zip

    - name: Package as ZIP
      run: |
        cd build
        zip -r ../SharpTimer.zip .
      shell: bash  # 使用 bash 作为默认的 shell
      env:
        DOTNET_ROOT: /usr/share/dotnet

    - name: Generate artifact name based on SHA256 hash
      run: |
        SHA256_HASH=$(sha256sum SharpTimer.zip | cut -d ' ' -f 1)
        mv SharpTimer.zip "SharpTimer-${SHA256_HASH}.zip"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SharpTimer
        path: SharpTimer-${{ steps.generate-artifact-name.outputs.sha256 }}.zip
        if-no-files-found: warn
        compression-level: 6
        overwrite: false
        include-hidden-files: false
      env:
        DOTNET_ROOT: /usr/share/dotnet
